kind = "web"
previewPath = "/"
title = "CRM Dashboard"
version = "1.0.0"
id = "artifacts/crm-frontend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20107
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/crm-frontend run dev"

[services.env]
PORT = "20107"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/crm-frontend", "run", "build"]
publicDir = "artifacts/crm-frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
