services:
  postgres:
    image: postgres:16-alpine
    container_name: netmind-gateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-netmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netmind_password}
      POSTGRES_DB: ${POSTGRES_DB:-netmind_db}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-netmind} -d ${POSTGRES_DB:-netmind_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netmind-gateway-network

  crm-backend:
    build:
      context: .
      dockerfile: Dockerfile.crm-backend
    container_name: netmind-gateway-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://netmind:netmind_password@postgres:5432/netmind_db}
      SESSION_SECRET: ${SESSION_SECRET:-your-secret-key-change-in-production}
      API_PREFIX: ${API_PREFIX:-/api}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@crm.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-System Admin}
      SSO_AUTH_URL: ${SSO_AUTH_URL:-}
      SSO_LOGOUT_URL: ${SSO_LOGOUT_URL:-}
      SSO_APP_CODE: ${SSO_APP_CODE:-}
      SSO_SERVICE_URL: ${SSO_SERVICE_URL:-}
      SSO_TICKET_API_URL: ${SSO_TICKET_API_URL:-}
      SSO_TICKET_API_BEARER: ${SSO_TICKET_API_BEARER:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - netmind-gateway-network

  crm-frontend:
    build:
      context: .
      dockerfile: Dockerfile.crm-frontend
    container_name: netmind-gateway-frontend
    restart: unless-stopped
    environment:
      PORT: ${VITE_INTERNAL_PORT:-5173}
      BASE_PATH: ${BASE_PATH:-/}
    networks:
      - netmind-gateway-network

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: netmind-gateway-nginx
    restart: unless-stopped
    environment:
      CRM_API_URL: ${CRM_API_URL:-http://crm-backend:8000}
      VITE_API_BASE: ${VITE_API_BASE:-/api}
      VITE_INTERNAL_PORT: ${VITE_INTERNAL_PORT:-5173}
    ports:
      - "${NGINX_PORT:-5174}:80"
    depends_on:
      - crm-frontend
      - crm-backend
    networks:
      - netmind-gateway-network

networks:
  netmind-gateway-network:
    driver: bridge